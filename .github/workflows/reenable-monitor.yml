name: Re-enable Pokeca Monitor

on:
  schedule:
    # 毎月1日 01:00 UTC = JST 10:00 に Pokeca Monitor を再有効化
    # （LINE 月次クオータ 200 通到達でフリーズ → 月初リセット後に自動復帰させる）
    - cron: '0 1 1 * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  enable:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Enable Pokeca Monitor workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh workflow enable "Pokeca Monitor"
          gh workflow list | grep "Pokeca Monitor"
